version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - ENV=production
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  default_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.tasks.analysis_tasks.celery_app worker -Q default --loglevel=info --concurrency=4
    env_file:
      - .env.prod
    environment:
      - ENV=production
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  heavy_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.tasks.analysis_tasks.celery_app worker -Q heavy_ai --loglevel=info --concurrency=1
    env_file:
      - .env.prod
    environment:
      - ENV=production
    restart: always
    # Reserve optional GPU capacity for Stable Diffusion inferences
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homedecor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homedecor_password}
      POSTGRES_DB: ${POSTGRES_DB:-homedecor_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homedecor_user} -d ${POSTGRES_DB:-homedecor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data

volumes:
  postgres_prod_data:
  redis_prod_data:
